server:
  port: 9090

jwt:
  secret: ${JWT_SECRET:mysupersecuresecretkeywhichisatleast32characterslong}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /api/v3/api-docs/swagger-config
    urls:
      - name: user-service
        url: /api/users/v3/api-docs
      - name: auth-service
        url: /api/auth/v3/api-docs
      - name: mentor-service
        url: /api/mentors/v3/api-docs
      - name: session-service
        url: /api/sessions/v3/api-docs
      - name: notification-service
        url: /api/notifications/v3/api-docs
      - name: group-service
        url: /api/groups/v3/api-docs
      - name: skill-service
        url: /api/skills/v3/api-docs
      - name: review-service
        url: /api/reviews/v3/api-docs
      - name: payment-service
        url: /api/payments/v3/api-docs
