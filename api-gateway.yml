server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. User/Auth Service (Profile, Admin, Internal)
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /api/admin/users/**, /api/internal/users/**
          filters:
            - StripPrefix=1

        # 2. Mentor Service (Approval, Listings)
        - id: mentor-service
          uri: lb://mentor-service
          predicates:
            - Path=/api/mentors/**
          filters:
            - StripPrefix=1

        # 3. Session Service
        - id: session-service
          uri: lb://session-service
          predicates:
            - Path=/api/sessions/**
          filters:
            - StripPrefix=1

        # 4. Skill Service
        - id: skill-service
          uri: lb://skill-service
          predicates:
            - Path=/api/skills/**
          filters:
            - StripPrefix=1

jwt:
  secret: mysupersecuresecretkeywhichisatleast32characterslong

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/