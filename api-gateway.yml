server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. Auth Service Route
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # 2. Mentor Service Route
        - id: mentor-service
          uri: lb://mentor-service
          predicates:
            - Path=/api/mentors/**
          filters:
            - StripPrefix=1

        # 3. Session Service Route
        - id: session-service
          uri: lb://session-service
          predicates:
            - Path=/api/sessions/**
          filters:
            - StripPrefix=1

        # 4. Skill Service Route
        - id: skill-service
          uri: lb://skill-service
          predicates:
            - Path=/api/skills/**
          filters:
            - StripPrefix=1

jwt:
  secret: mysupersecuresecretkeywhichisatleast32characterslong

management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/