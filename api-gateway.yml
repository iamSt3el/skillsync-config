server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. AUTH SERVICE
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # 2. USER SERVICE
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        # 3. ADMIN USER SERVICE
        - id: admin-user-service
          uri: lb://user-service
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1

        # 4. INTERNAL USER SERVICE
        - id: internal-user-service
          uri: lb://user-service
          predicates:
            - Path=/api/internal/**
          filters:
            - StripPrefix=1

        # 5. MENTOR SERVICE
        - id: mentor-service
          uri: lb://mentor-service
          predicates:
            - Path=/api/mentors/**
          filters:
            - StripPrefix=1

        # 6. SKILL SERVICE
        - id: skill-service
          uri: lb://skill-service
          predicates:
            - Path=/api/skills/**
          filters:
            - StripPrefix=1

        # 7. SESSION SERVICE
        - id: session-service
          uri: lb://session-service
          predicates:
            - Path=/api/sessions/**
          filters:
            - StripPrefix=1

        # 8. REVIEW SERVICE
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**
          filters:
            - StripPrefix=1

        # 9. GROUP SERVICE
        - id: group-service
          uri: lb://group-service
          predicates:
            - Path=/api/groups/**
          filters:
            - StripPrefix=1

        # 10. NOTIFICATION SERVICE
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

jwt:
  secret: mysupersecuresecretkeywhichisatleast32characterslong

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
