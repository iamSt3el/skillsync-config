spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:mysql://mysql:3306/skillsync_auth?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

server:
  port: 8081

springdoc:
  api-docs:
    path: /auth/v3/api-docs

jwt:
  secret: mysupersecuresecretkeywhichisatleast32characterslong
  expiration: 86400000
  refresh-expiration: 604800000

